name: Nix

on:
  push:
    paths:
      - flake.nix
      - flake.lock
  pull_request:
    paths:
      - flake.nix
      - flake.lock

jobs:
  flake:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check flake outputs
        run: |
          echo "::group::nix flake check"
          nix flake check --print-build-logs
          echo "::endgroup::"

      - name: Build package outputs
        run: |
          echo "::group::Build plank"
          nix build .#plank --no-link --print-build-logs
          echo "::endgroup::"

          echo "::group::Build tree-sitter-plank"
          nix build .#tree-sitter-plank --no-link --print-build-logs
          echo "::endgroup::"
