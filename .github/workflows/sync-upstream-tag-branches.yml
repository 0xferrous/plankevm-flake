name: Sync upstream tag branches

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: Dispatch one workflow per upstream tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch tag sync workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          upstream="plankevm/plank-monorepo"
          workflow="sync-one-upstream-tag.yml"
          skip_tags=(
            "v0.0.1-alpha.1"
            "v0.0.1-alpha.2"
          )
          summary_file="$(mktemp)"

          {
            echo "# Upstream tag sync dispatch"
            echo
            echo "| Tag | Workflow | Result |"
            echo "| --- | --- | --- |"
          } >> "$summary_file"

          git ls-remote --tags --refs "https://github.com/${upstream}.git" \
            | awk '{print $2}' \
            | sed 's#refs/tags/##' \
            | while IFS= read -r tag; do
              branch="tag/${tag}"

              for skip_tag in "${skip_tags[@]}"; do
                if [ "${tag}" = "${skip_tag}" ]; then
                  echo "Skipping ${tag}; tag is in skip list"
                  echo "| ${tag} | ${workflow} | skipped: skip list |" >> "$summary_file"
                  continue 2
                fi
              done

              if git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
                echo "Skipping ${tag}; ${branch} already exists"
                echo "| ${tag} | ${workflow} | skipped: branch exists |" >> "$summary_file"
                continue
              fi

              echo "::group::Dispatch ${workflow} for ${tag}"
              gh workflow run "${workflow}" --ref main -f tag="${tag}"
              echo "::endgroup::"

              echo "| ${tag} | ${workflow} | dispatched |" >> "$summary_file"
            done

          cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
